<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 - 阶段性数值调整成果展示</title>
    <link rel="stylesheet" href="/battle_view/battle-view.css">
    <link rel="stylesheet" href="/balance_showcase/styles.css">
  </head>
  <body>
    <main class="showcase-shell">
      <header class="showcase-top">
        <div>
          <a class="back-link" href="/workbench/">返回工作台</a>
          <h1>阶段性数值调整成果展示</h1>
          <p>2026-06-29 · 不加点 4v4 标准对局</p>
        </div>
        <div class="top-actions">
          <button id="previewBtn" type="button">预览阵容</button>
          <button id="playBtn" type="button" class="primary">播放对局</button>
        </div>
      </header>

      <section class="showcase-layout">
        <aside class="scenario-rail" aria-label="标准化对局">
          <div class="rail-head">
            <h2>对局组</h2>
            <span id="scenarioCount">0</span>
          </div>
          <div id="scenarioList" class="scenario-list"></div>
        </aside>

        <section class="battle-stage" aria-label="战斗展示">
          <div class="stage-head">
            <div>
              <span id="scenarioType">-</span>
              <strong id="scenarioTitle">-</strong>
            </div>
            <div id="matchBadge" class="match-badge">待命</div>
          </div>
          <div id="battleMount" class="battle-mount"></div>
        </section>

        <aside class="analysis-panel" aria-label="对局分析">
          <section class="analysis-block">
            <h2>左队</h2>
            <strong id="leftName">-</strong>
            <p id="leftDesc">-</p>
            <div id="leftUnits" class="unit-list"></div>
          </section>
          <section class="analysis-block">
            <h2>右队优势点</h2>
            <p id="rightEdge">-</p>
          </section>
          <section class="analysis-block">
            <h2>观察点</h2>
            <ul id="watchList" class="watch-list"></ul>
          </section>
          <section class="analysis-block">
            <h2>快速验算</h2>
            <div id="quickStats" class="quick-stats"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="/game_data/skill-assets.js"></script>
    <script src="/game_data/skill-data.js"></script>
    <script src="/game_data/combat-signals.js"></script>
    <script src="/game_data/combat-sim.js"></script>
    <script src="/battle_view/battle-view.js"></script>
    <script src="/balance_showcase/showcase.js"></script>
  </body>
</html>
