<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attention Samples - Raw</title>
    <style>
      body {
        margin: 0;
        background: #111;
        color: #eee;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }
      main {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px;
      }
      h1, h2, p { margin: 0; }
      h1 { margin-bottom: 8px; }
      p { color: #aaa; line-height: 1.5; }
      section {
        margin-top: 28px;
        padding: 16px;
        border: 1px solid #333;
        background: #181818;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        margin-top: 12px;
        border: 1px solid #2a2a2a;
      }
      a { color: #d7b75e; }
    </style>
  </head>
  <body>
    <main>
      <h1>无标注样本</h1>
      <p>先只看这些原图，自己判断第一眼看到什么、主目标是什么、哪些东西干扰了目标。看完再打开 <a href="./annotated.html">annotated.html</a> 对照。</p>

      <section>
        <h2>Sample A: Steam 首页</h2>
        <p>预设 intent：浏览商店推荐，判断当前主推游戏是否值得点进去。</p>
        <img src="./steam_home.png" alt="Steam homepage screenshot">
      </section>

      <section>
        <h2>Sample B: itch.io 免费游戏列表</h2>
        <p>预设 intent：浏览免费游戏，筛选或选择一个游戏卡片。</p>
        <img src="./itch_games.png" alt="itch.io games list screenshot">
      </section>

      <section>
        <h2>Sample C: Sudoku.com 数独页</h2>
        <p>预设 intent：进入解谜状态，找到棋盘、当前操作、下一步应该点什么。</p>
        <img src="./sudoku_home.png" alt="Sudoku page screenshot">
      </section>
    </main>
  </body>
</html>
