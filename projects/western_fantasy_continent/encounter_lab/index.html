<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 - 关卡斗技场</title>
    <link rel="stylesheet" href="/battle_view/battle-view.css?v=20260625_battleview6">
    <link rel="stylesheet" href="/encounter_lab/styles.css">
  </head>
  <body>
    <main class="encounter-app">
      <header class="topbar">
        <div>
          <a href="/workbench/" class="back-link">返回工作台</a>
          <h1>关卡斗技场</h1>
          <p>看敌人机制，组一支小队，然后用战斗结果验证这关有没有多种过法。</p>
        </div>
        <div class="actions">
          <button id="autoBtn" type="button">填入可过队</button>
          <button id="runBtn" type="button" class="primary">开始挑战</button>
        </div>
      </header>

      <section class="encounter-shell">
        <aside class="left-rail">
          <section class="panel level-panel">
            <div class="panel-head">
              <h2>关卡</h2>
              <span>选择挑战</span>
            </div>
            <div class="level-strip" id="levelStrip" aria-label="关卡选择"></div>
          </section>

          <section class="panel threat-panel">
            <div class="panel-head">
              <h2 id="battleTitle">关卡情报</h2>
              <span id="solverSummary">未分析</span>
            </div>
            <div id="enemyBrief" class="enemy-brief"></div>
          </section>
        </aside>

        <section class="center-stage">
          <section class="panel battle-panel">
            <div class="panel-head">
              <h2>战斗预览</h2>
              <span id="battleState">待命</span>
            </div>
            <div id="battlefield" class="battlefield battle-view-host"></div>
          </section>
        </section>

        <aside class="right-rail">
          <section class="panel squad-panel">
            <div class="panel-head">
              <h2>当前小队</h2>
              <span id="pickCounter">0 / 0</span>
            </div>
            <div id="squadSlots" class="squad-slots"></div>
            <div id="teamHint" class="team-hint"></div>
          </section>

          <section class="panel roster-panel">
            <div class="panel-head">
              <h2>候选角色</h2>
              <span>点击加入/移出</span>
            </div>
            <div id="rosterGrid" class="roster-grid"></div>
          </section>

          <section class="panel result-panel">
            <div class="panel-head">
              <h2>挑战结果</h2>
              <span id="resultBadge">未开始</span>
            </div>
            <div class="result-box" id="resultBox"></div>
            <details class="solver-box">
              <summary>调试：查看可过/失败组合</summary>
              <div class="combo-list">
                <h3>可过组合</h3>
                <div id="winnerList"></div>
              </div>
              <div class="combo-list">
                <h3>失败样例</h3>
                <div id="failList"></div>
              </div>
            </details>
          </section>
        </aside>
      </section>
    </main>

    <script src="/game_data/skill-assets.js"></script>
    <script src="/game_data/skill-data.js"></script>
    <script src="/game_data/combat-signals.js"></script>
    <script src="/game_data/combat-sim.js"></script>
    <script src="/game_data/encounter-data.js"></script>
    <script src="/battle_view/battle-view.js?v=20260625_battleview6"></script>
    <script src="/encounter_lab/encounter-lab.js"></script>
  </body>
</html>
