<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 - 掉落</title>
    <link rel="stylesheet" href="/equipment_grind_simulator/styles.css">
  </head>
  <body data-page="loot">
    <main class="grind-shell mode-loot">
      <header class="topbar">
        <div>
          <a class="back-link" href="/workbench/">工作台</a>
          <h1>掉落</h1>
          <p>查看最近掉落和背包存货。</p>
        </div>
        <nav class="page-nav">
          <a href="/equipment_grind_simulator/">副本</a>
          <a href="/equipment_grind_simulator/team.html">队伍</a>
          <a href="/equipment_grind_simulator/equipment.html">装备</a>
          <a class="active" href="/equipment_grind_simulator/loot.html">掉落</a>
        </nav>
        <div class="top-stats">
          <div><span>背包装备</span><strong id="bagCount">0/42</strong></div>
          <div><span>最近掉落</span><strong id="lootCount">0 件</strong></div>
        </div>
      </header>

      <section class="page-layout loot-layout">
        <section class="loot-panel page-panel">
          <div class="panel-head"><span>最近掉落</span><strong id="lootCountPanel">0 件</strong></div>
          <div id="rewardBurst" class="reward-burst">赢了掉 2-4 件装备</div>
          <div id="lootLog" class="loot-log"></div>
        </section>
        <section class="bag-panel page-panel">
          <div class="panel-head"><span>背包</span><strong id="bagCountPanel">0/42</strong></div>
          <div id="bagGrid" class="bag-grid"></div>
        </section>
      </section>
    </main>

    <script src="/game_data/skill-assets.js"></script>
    <script src="/game_data/skill-data.js"></script>
    <script src="/equipment_grind_simulator/equipment-grind-simulator.js"></script>
  </body>
</html>
