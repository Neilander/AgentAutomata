<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 - 流派竞技场</title>
    <link rel="stylesheet" href="/genre_arena/styles.css">
  </head>
  <body>
    <main class="arena-app">
      <header class="topbar">
        <div>
          <a href="/workbench/" class="back-link">返回工作台</a>
          <h1>流派竞技场</h1>
          <p>4v4 自动战斗沙盒。先看战斗，再选择左右队伍和调技能。</p>
        </div>
        <div class="controls">
          <button id="startBtn" type="button">开始</button>
          <button id="resetBtn" type="button">重置</button>
          <button id="speedBtn" type="button">速度 x1</button>
        </div>
      </header>

      <section class="battle-panel battle-panel-main">
        <div class="scorebar">
          <div><strong id="leftAlive">4</strong><span>左队存活</span></div>
          <div><strong id="battleTimer">0.0s</strong><span id="battleState">待命</span></div>
          <div><strong id="rightAlive">4</strong><span>右队存活</span></div>
        </div>
        <div id="battlefield" class="battlefield">
          <div id="fxLayer" class="fx-layer"></div>
          <div id="unitLayer" class="unit-layer"></div>
        </div>
        <div class="legend">
          <span><i class="dot poison"></i>剧毒</span>
          <span><i class="dot shield"></i>护盾</span>
          <span><i class="dot cast"></i>技能冷却</span>
        </div>
      </section>

      <section id="presetButtons" class="preset-dock"></section>

      <section class="layout">
        <aside class="team-panel">
          <div class="panel-head">
            <h2>左队配置</h2>
            <span id="leftSummary">剧毒绽放</span>
          </div>
          <div id="leftConfig" class="unit-config"></div>
        </aside>

        <aside class="team-panel">
          <div class="panel-head">
            <h2>右队配置</h2>
            <span id="rightSummary">铁壁反击</span>
          </div>
          <div id="rightConfig" class="unit-config"></div>
        </aside>
      </section>

      <section class="bottom-grid">
        <article class="flow-card">
          <div class="panel-head">
            <h2>职业技能库</h2>
            <span>技能、被动、大招</span>
          </div>
          <p>这里展示当前技能库。后续 AI 生成技能后，应先经过关键词分类、预算模型、红队和流派回归。</p>
          <div id="skillLibrary" class="skill-library"></div>
        </article>
        <article class="log-card">
          <div class="panel-head">
            <h2>战斗日志</h2>
            <span>技能触发与胜负</span>
          </div>
          <div id="combatLog" class="combat-log"></div>
        </article>
      </section>

      <section class="balance-panel">
        <div class="panel-head">
          <h2>宏观平衡巡检</h2>
          <button id="simBtn" type="button">跑预设胜率</button>
        </div>
        <div id="matchupGrid" class="matchup-grid">
          <div class="empty-balance">点击“跑预设胜率”，快速查看流派之间的优势关系。</div>
        </div>
      </section>

      <footer class="credits">Icons: game-icons.net, CC BY 3.0.</footer>
    </main>
    <script src="/game_data/skill-assets.js"></script>
    <script src="/game_data/skill-data.js"></script>
    <script src="/game_data/combat-signals.js"></script>
    <script src="/game_data/combat-sim.js"></script>
    <script src="/genre_arena/genre-arena.js"></script>
  </body>
</html>
