<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>关键词工作台</title>
    <link rel="stylesheet" href="/keyword_workbench/styles.css">
  </head>
  <body>
    <main class="keyword-app">
      <header class="topbar">
        <div>
          <a href="/workbench/">返回工作台</a>
          <h1>机制关键词工作台</h1>
          <p>记录关键词类型、当前使用度、潜力和注意事项，给后续技能设计和 agent 自动扩展使用。</p>
        </div>
      </header>
      <section id="categoryRail" class="category-rail"></section>
      <section class="toolbar">
        <button type="button" data-filter="all" class="active">全部</button>
        <button type="button" data-filter="priority">优先探索</button>
        <button type="button" data-filter="moderate">适度探索</button>
        <button type="button" data-filter="low">低优先级</button>
        <button type="button" data-filter="rare">稀有保留</button>
      </section>
      <section id="keywordGrid" class="keyword-grid"></section>
    </main>
    <script src="/game_data/keyword-mechanics.js"></script>
    <script src="/keyword_workbench/keyword-workbench.js"></script>
  </body>
</html>
