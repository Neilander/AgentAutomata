<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 · 伪 Spine 骨骼展示</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage-shell">
      <section class="toolbar" aria-label="骨骼展示控制">
        <div class="brand-block">
          <h1>西幻大陆 · 角色骨骼</h1>
          <p>骨骼、插槽、挂件、朝向和动作状态的第一版验证。</p>
        </div>
        <div class="controls">
          <label>
            动作
            <select id="animationSelect"></select>
          </label>
          <label>
            职业
            <select id="classSelect"></select>
          </label>
          <label>
            胸甲
            <select id="armorSelect"></select>
          </label>
          <label>
            武器
            <select id="weaponSelect"></select>
          </label>
          <button id="flipBtn" type="button">转向</button>
        </div>
      </section>

      <section class="showcase">
        <aside class="system-panel">
          <h2>插槽</h2>
          <div id="slotList" class="slot-list"></div>
        </aside>

        <section class="stage" aria-label="角色展示舞台">
          <div class="floor"></div>
          <div id="actorMount" class="actor-mount"></div>
        </section>

        <aside class="system-panel">
          <h2>骨骼</h2>
          <div id="boneList" class="bone-list"></div>
        </aside>
      </section>

      <section class="variants" aria-label="职业剪影">
        <div id="variantStrip" class="variant-strip"></div>
      </section>
    </main>
    <script src="skeleton-demo.js"></script>
  </body>
</html>
