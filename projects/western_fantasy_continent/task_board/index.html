<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>任务预算表 · 西幻大陆</title>
    <link rel="stylesheet" href="/task_board/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <a class="back" href="/workbench/">返回工作台</a>
          <h1>任务预算表</h1>
          <p>先调用 budget，再调用调试 skill，调试完回写尝试次数和证据。</p>
        </div>
        <button id="saveButton" type="button">保存修改</button>
      </header>

      <section class="summary" aria-label="任务总览">
        <div class="summary-card">
          <span>任务数</span>
          <strong id="totalTasks">0</strong>
        </div>
        <div class="summary-card">
          <span>进行中</span>
          <strong id="activeTasks">0</strong>
        </div>
        <div class="summary-card">
          <span>已用尝试</span>
          <strong id="usedAttempts">0</strong>
        </div>
        <div class="summary-card">
          <span>剩余尝试</span>
          <strong id="remainingAttempts">0</strong>
        </div>
      </section>

      <section class="workflow">
        <h2>固定工作流</h2>
        <ol id="workflowList"></ol>
      </section>

      <section class="board-head">
        <div>
          <h2>任务队列</h2>
          <p id="updatedAt">等待读取...</p>
        </div>
        <div class="filters" role="group" aria-label="筛选任务">
          <button class="filter active" type="button" data-filter="all">全部</button>
          <button class="filter" type="button" data-filter="active">进行中</button>
          <button class="filter" type="button" data-filter="queued">排队</button>
          <button class="filter" type="button" data-filter="high">高优先级</button>
        </div>
      </section>

      <section id="taskList" class="task-list" aria-live="polite"></section>
      <p id="statusLine" class="status-line"></p>
    </main>

    <script src="/task_board/task-board.js"></script>
  </body>
</html>
