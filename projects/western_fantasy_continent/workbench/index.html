<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>西幻大陆 · 工作台</title>
    <link rel="stylesheet" href="/workbench/styles.css">
  </head>
  <body>
    <main class="workbench">
      <section class="hero">
        <div>
          <h1>西幻大陆工作台</h1>
          <p>工具、战斗 demo、数值验证和后续内容生产入口。</p>
        </div>
        <a class="primary-link" href="/advanced_battle_demo/">打开新版战斗</a>
      </section>

      <section class="section">
        <h2>工具</h2>
        <div class="grid">
          <a class="entry" href="/trace_tool/">
            <strong>角色描图工具</strong>
            <span>基于参考图描骨骼点和部件轮廓，输出 trace JSON。</span>
          </a>
          <a class="entry" href="/spine_skeleton_demo/">
            <strong>伪 Spine 骨骼展示</strong>
            <span>早期骨骼、插槽、动作状态研究页。</span>
          </a>
          <a class="entry" href="/effect_lab/">
            <strong>战斗特效实验室</strong>
            <span>CSS、Canvas、JS 调度和 PixiJS 四套方案，测试刀挥击、爆炸、冰冻、护盾。</span>
          </a>
        </div>
      </section>

      <section class="section">
        <h2>Demo</h2>
        <div class="grid">
          <a class="entry highlight" href="/world_map_demo/">
            <strong>大地图刷怪成长</strong>
            <span>选择区块刷怪，获得经验和递进品质装备，验证基础成长循环。</span>
          </a>
          <a class="entry" href="/battle_autochess/">
            <strong>基础自走器战斗</strong>
            <span>第一版 1-4 人对战，职业、移动、攻击和胜负结算。</span>
          </a>
          <a class="entry" href="/advanced_battle_demo/">
            <strong>装备藏品 3v3 战斗</strong>
            <span>每人可换职业、装备套装和最多 6 个藏品，用于验证团战玩法。</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
